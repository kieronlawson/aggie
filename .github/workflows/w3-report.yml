name: w3-report

on:
  workflow_dispatch:
    inputs:
      vertical:
        description: "Vertical to report on (empty = every vertical with registered sources)"
        required: false
        type: choice
        default: finance
        options:
          - finance
          - insurance
          - healthcare
          - competitor
      force:
        description: "Regenerate and re-post even if today's digest was already delivered"
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
  schedule:
    # Sundays 06:00 UTC = 18:00 NZST / 19:00 NZDT
    - cron: "0 6 * * 0"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run report -- --vertical "$INPUT_VERTICAL" --force "$INPUT_FORCE"
        env:
          INPUT_VERTICAL: ${{ inputs.vertical }}
          INPUT_FORCE: ${{ inputs.force }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          TURBOPUFFER_API_KEY: ${{ secrets.TURBOPUFFER_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
