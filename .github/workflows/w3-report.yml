name: w3-report
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      vertical:
        description: Restrict to one vertical (default = all with active sources)
        type: choice
        options: ["", finance, insurance, healthcare, competitor]
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          TURBOPUFFER_API_KEY: ${{ secrets.TURBOPUFFER_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TURBOPUFFER_REGION: ${{ vars.TURBOPUFFER_REGION }}
          OUTPUT_STAGE: ${{ vars.OUTPUT_STAGE }}
          INPUT_VERTICAL: ${{ inputs.vertical }}
